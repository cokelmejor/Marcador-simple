<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Marcador en Vivo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: linear-gradient(150deg, #1e60b0 0%, #0e3474 45%, #071a40 100%);
  font-family: 'Barlow Condensed', sans-serif;
  color: #fff;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
}
.card {
  background: rgba(8,22,60,0.85);
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 12px 48px rgba(0,0,0,0.5);
  padding: 28px 40px 24px;
  width: 92%; max-width: 520px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
}
.league-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
.ldot { width: 7px; height: 7px; border-radius: 50%; background: #ff4d4d; animation: pulse 1.8s ease-in-out infinite; flex-shrink: 0; }
.ldot.off { background: rgba(255,255,255,.3); animation: none; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.6)} }
.league-name { font-size: 0.76rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.5); }
.sport-badge { font-size: 0.6rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; background: rgba(245,197,24,0.15); color: #f5c518; padding: 2px 8px; border-radius: 20px; border: 1px solid rgba(245,197,24,0.3); }
.scoreboard { display: flex; align-items: center; justify-content: space-between; gap: 12px; width: 100%; }
.team { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }
.logo-wrap { width: 68px; height: 68px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.5); overflow: hidden; }
.logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
.team-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 1.5px; text-align: center; }
.center { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; }
.score { font-family: 'Bebas Neue', sans-serif; font-size: 4rem; letter-spacing: 6px; line-height: 1; }
.score .sep { opacity: .35; font-size: 2.6rem; }
.clock-wrap { display: flex; align-items: center; gap: 5px; }
.clock-dot { width: 5px; height: 5px; border-radius: 50%; background: #ff4d4d; animation: pulse 1.8s ease-in-out infinite; }
.clock { font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem; letter-spacing: 2px; color: #ff6b6b; }
.clock.static { color: rgba(255,255,255,.4); }
.divider { width: 100%; height: 1px; background: rgba(255,255,255,0.07); }
.stats { width: 100%; display: flex; flex-direction: column; gap: 8px; }
.stat-row { display: grid; grid-template-columns: 44px 1fr 44px; align-items: center; gap: 8px; }
.sv { font-size: 0.85rem; font-weight: 700; }
.sv.h { text-align: right; } .sv.a { text-align: left; }
.stat-mid { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.stat-lbl { font-size: 0.58rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,.4); }
.bar-wrap { width: 100%; height: 3px; background: rgba(255,255,255,.1); border-radius: 3px; overflow: hidden; position: relative; }
.bar-fill { position: absolute; left: 0; top: 0; height: 100%; background: rgba(255,255,255,.55); border-radius: 3px; transition: width .7s ease; }
.upcoming-mode { width: 100%; display: flex; flex-direction: column; gap: 0; }
.upcoming-header { font-family: 'Bebas Neue', sans-serif; font-size: 0.72rem; letter-spacing: 3px; color: rgba(255,255,255,.35); text-transform: uppercase; text-align: center; margin-bottom: 14px; }
.upcoming-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
.upcoming-item:last-child { border-bottom: none; }
.up-time { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; color: #f5c518; min-width: 48px; text-align: center; flex-shrink: 0; }
.up-match { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.up-team { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 70px; flex-shrink: 0; }
.up-logo { width: 36px; height: 36px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 3px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.4); }
.up-logo img { width: 100%; height: 100%; object-fit: contain; }
.up-tname { font-size: 0.68rem; font-weight: 700; text-align: center; color: rgba(255,255,255,.8); line-height: 1.1; }
.up-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.up-vs { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: rgba(255,255,255,.25); letter-spacing: 2px; }
.up-league { font-size: 0.58rem; color: rgba(255,255,255,.3); letter-spacing: .5px; text-align: center; }
.countdown { font-family: 'Bebas Neue', sans-serif; font-size: 0.68rem; letter-spacing: 1px; color: rgba(255,255,255,.35); text-align: center; margin-top: 4px; }
.refresh-btn { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.45); font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; font-size: 0.72rem; padding: 6px 20px; border-radius: 20px; cursor: pointer; transition: background .2s, color .2s; }
.refresh-btn:hover { background: rgba(255,255,255,0.13); color: rgba(255,255,255,0.8); }
.refresh-btn:disabled { opacity: .4; cursor: default; }
.footer { font-size: 0.58rem; letter-spacing: 1px; color: rgba(255,255,255,.22); text-transform: uppercase; }
</style>
</head>
<body>
<div class="card">
  <div class="league-row">
    <div class="ldot" id="ldot"></div>
    <div class="league-name" id="league-name">Conectando...</div>
    <div class="sport-badge" id="sport-badge" style="display:none"></div>
  </div>
  <div id="live-view" style="display:none; width:100%; flex-direction:column; align-items:center; gap:20px;">
    <div class="scoreboard">
      <div class="team">
        <div class="logo-wrap"><img id="home-logo" src="" alt=""></div>
        <div class="team-name" id="home-name">–</div>
      </div>
      <div class="center">
        <div class="score"><span id="home-score">0</span><span class="sep"> – </span><span id="away-score">0</span></div>
        <div class="clock-wrap">
          <div class="clock-dot" id="clock-dot"></div>
          <div class="clock" id="clock">–</div>
        </div>
      </div>
      <div class="team">
        <div class="logo-wrap"><img id="away-logo" src="" alt=""></div>
        <div class="team-name" id="away-name">–</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="stats">
      <div class="stat-row">
        <div class="sv h" id="poss-h">–</div>
        <div class="stat-mid"><div class="stat-lbl">Posesión</div><div class="bar-wrap"><div class="bar-fill" id="bar-poss" style="width:50%"></div></div></div>
        <div class="sv a" id="poss-a">–</div>
      </div>
      <div class="stat-row">
        <div class="sv h" id="shots-h">–</div>
        <div class="stat-mid"><div class="stat-lbl">Tiros a puerta</div><div class="bar-wrap"><div class="bar-fill" id="bar-shots" style="width:50%"></div></div></div>
        <div class="sv a" id="shots-a">–</div>
      </div>
      <div class="stat-row">
        <div class="sv h" id="fouls-h">–</div>
        <div class="stat-mid"><div class="stat-lbl">Faltas</div><div class="bar-wrap"><div class="bar-fill" id="bar-fouls" style="width:50%"></div></div></div>
        <div class="sv a" id="fouls-a">–</div>
      </div>
      <div class="stat-row">
        <div class="sv h" id="corners-h">–</div>
        <div class="stat-mid"><div class="stat-lbl">Córners</div><div class="bar-wrap"><div class="bar-fill" id="bar-corners" style="width:50%"></div></div></div>
        <div class="sv a" id="corners-a">–</div>
      </div>
      <div class="stat-row">
        <div class="sv h" id="yellow-h">–</div>
        <div class="stat-mid"><div class="stat-lbl">Tarjetas amarillas</div><div class="bar-wrap"><div class="bar-fill" id="bar-yellow" style="width:50%"></div></div></div>
        <div class="sv a" id="yellow-a">–</div>
      </div>
    </div>
  </div>
  <div id="upcoming-view" style="display:none; width:100%;">
    <div class="upcoming-mode">
      <div class="upcoming-header">Próximos partidos hoy</div>
      <div id="upcoming-list"></div>
      <div class="countdown" id="countdown"></div>
    </div>
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="handleRefresh()">↻ ACTUALIZAR</button>
  <div class="footer" id="footer">Pulsa actualizar para cargar datos</div>
</div>

<script>
function set(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = (val !== null && val !== undefined) ? val : '–';
}
function setBar(id, h, a) {
  const ph = parseFloat(h) || 0, pa = parseFloat(a) || 0;
  const el = document.getElementById(id);
  if (el) el.style.width = Math.round(ph / (ph + pa || 1) * 100) + '%';
}
function sportEmoji(sport) {
  return { football:'⚽', tennis:'🎾', basketball:'🏀', hockey:'🏒' }[sport] || '🏅';
}
function timeUntil(ts) {
  const diff = ts * 1000 - Date.now();
  if (diff <= 0) return 'Comenzando...';
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return h > 0 ? `En ${h}h ${m}m` : `En ${m} minutos`;
}

// ── Reloj interpolado ──────────────────────────────────────────
let clockState = null;
let clockInterval = null;

function startClock(m) {
  if (clockInterval) clearInterval(clockInterval);
  const clock    = document.getElementById('clock');
  const clockDot = document.getElementById('clock-dot');

  if (!m.isLive || m.isHalfTime) {
    // Partido no en juego: mostrar texto estático
    const label = m.isHalfTime
      ? 'DESCANSO'
      : (m.statusLong || m.minute || m.status || '–');
    clock.textContent = label;
    clock.classList.add('static');
    clockDot.style.display = 'none';
    return;
  }

  clock.classList.remove('static');
  clockDot.style.display = 'block';

  if (m.periodStart) {
    // Modo preciso: calculamos desde el timestamp de inicio del período.
    // No depende de sincronía entre relojes de servidor y cliente.
    const periodOffsetMin = m.period === 2 ? 45 : (m.period === 3 ? 90 : (m.period === 4 ? 105 : 0));
    clockState = { periodStart: m.periodStart, periodOffsetMin };
  } else if (m.minuteNum !== null) {
    // Modo aproximado: minuto conocido + tiempo transcurrido desde que el cliente recibió los datos
    clockState = { minuteNum: m.minuteNum, receivedAt: Date.now() };
  } else {
    // Sin información de tiempo
    clock.textContent = m.statusLong || m.status || '–';
    clock.classList.add('static');
    clockDot.style.display = 'none';
    return;
  }

  function tick() {
    if (!clockState) return;
    let total;
    if (clockState.periodStart !== undefined) {
      const secondsInPeriod = Math.floor(Date.now() / 1000) - clockState.periodStart;
      total = clockState.periodOffsetMin * 60 + Math.max(0, secondsInPeriod);
    } else {
      const elapsed = Math.floor((Date.now() - clockState.receivedAt) / 1000);
      total = clockState.minuteNum * 60 + elapsed;
    }
    const mins = Math.min(Math.floor(total / 60), 99);
    const secs = total % 60;
    clock.textContent = `${mins}'${String(secs).padStart(2,'0')}`;
  }
  tick();
  clockInterval = setInterval(tick, 1000);
}

function renderUpcoming(upcoming) {
  const list = document.getElementById('upcoming-list');
  if (!upcoming || upcoming.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.3);font-size:0.8rem;padding:20px 0">No hay más partidos programados hoy</div>';
    return;
  }
  list.innerHTML = upcoming.map(u => `
    <div class="upcoming-item">
      <div class="up-time">${u.time}</div>
      <div class="up-match">
        <div class="up-team">
          <div class="up-logo"><img src="${u.homeLogo||''}" onerror="this.style.opacity=0"></div>
          <div class="up-tname">${u.home}</div>
        </div>
        <div class="up-center">
          <div class="up-vs">VS</div>
          <div class="up-league">${u.league}</div>
        </div>
        <div class="up-team">
          <div class="up-logo"><img src="${u.awayLogo||''}" onerror="this.style.opacity=0"></div>
          <div class="up-tname">${u.away}</div>
        </div>
      </div>
    </div>
  `).join('');
  if (upcoming[0]?.timestamp) set('countdown', timeUntil(upcoming[0].timestamp));
}

async function fetchMatch() {
  try {
    const res  = await fetch('/api/match');
    const data = await res.json();
    if (data.error) { set('league-name', 'Error'); set('footer', data.error); return; }
    if (!data.match) {
      if (clockInterval) clearInterval(clockInterval);
      document.getElementById('ldot').classList.add('off');
      set('league-name', 'Sin partidos en vivo');
      document.getElementById('live-view').style.display     = 'none';
      document.getElementById('upcoming-view').style.display = 'block';
      renderUpcoming(data.upcoming);
      set('footer', 'Actualizado: ' + new Date().toLocaleTimeString('es-ES'));
      return;
    }
    const m = data.match;
    document.getElementById('ldot').classList.remove('off');
    set('league-name', m.league);
    const badge = document.getElementById('sport-badge');
    badge.style.display = 'inline-block';
    badge.textContent = sportEmoji(m.sport) + ' ' + m.sport.toUpperCase();
    document.getElementById('live-view').style.display     = 'flex';
    document.getElementById('upcoming-view').style.display = 'none';

    // Logos via proxy
    const homeLogoEl = document.getElementById('home-logo');
    const awayLogoEl = document.getElementById('away-logo');
    if (m.home.logo) {
      homeLogoEl.onerror = function() { this.style.display = 'none'; };
      homeLogoEl.onload  = function() { this.style.display = ''; this.style.opacity = 1; };
      homeLogoEl.style.display = '';
      homeLogoEl.src = m.home.logo;
    }
    if (m.away.logo) {
      awayLogoEl.onerror = function() { this.style.display = 'none'; };
      awayLogoEl.onload  = function() { this.style.display = ''; this.style.opacity = 1; };
      awayLogoEl.style.display = '';
      awayLogoEl.src = m.away.logo;
    }

    set('home-name',  m.home.name);
    set('away-name',  m.away.name);
    set('home-score', m.home.score);
    set('away-score', m.away.score);

    startClock(m);

    const s = m.stats || {};
    set('poss-h',    s.possessionHome); set('poss-a',    s.possessionAway);
    set('shots-h',   s.shotsHome);      set('shots-a',   s.shotsAway);
    set('fouls-h',   s.foulsHome);      set('fouls-a',   s.foulsAway);
    set('corners-h', s.cornersHome);    set('corners-a', s.cornersAway);
    set('yellow-h',  s.yellowHome);     set('yellow-a',  s.yellowAway);

    const ph = parseFloat(s.possessionHome);
    document.getElementById('bar-poss').style.width = (isNaN(ph) ? 50 : ph) + '%';
    setBar('bar-shots',   s.shotsHome,   s.shotsAway);
    setBar('bar-fouls',   s.foulsHome,   s.foulsAway);
    setBar('bar-corners', s.cornersHome, s.cornersAway);
    setBar('bar-yellow',  s.yellowHome,  s.yellowAway);

    const liveCount = data.totalLive > 1 ? ` · ${data.totalLive} en vivo` : '';
    set('footer', `Actualizado: ${new Date(m.updated).toLocaleTimeString('es-ES')}${liveCount}`);
  } catch (err) {
    set('footer', 'Error de red: ' + err.message);
  }
}

async function handleRefresh() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = '↻ CARGANDO...';
  await fetchMatch();
  btn.disabled = false;
  btn.textContent = '↻ ACTUALIZAR';
}

fetchMatch();
</script>
</body>
</html>
